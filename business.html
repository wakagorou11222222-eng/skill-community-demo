const lucideSource = window.lucide || {};
const getLucideNode = (name) => {
    const candidate =
        (lucideSource.icons && lucideSource.icons[name]) ||
        lucideSource[name];
    return Array.isArray(candidate) ? candidate : null;
};

const renderIconChildren = (nodes, keyPrefix = "i") => (nodes || []).map((node, index) => {
    const [tag, attrs = {}, children] = node;
    return React.createElement(
        tag,
        { ...attrs, key: `${keyPrefix}-${index}` },
        Array.isArray(children) ? renderIconChildren(children, `${keyPrefix}-${index}`) : null
    );
});

const makeIcon = (name) => {
    return ({ size = 24, className = "", ...props }) => {
        const nodes = getLucideNode(name) || INLINE_ICON_PATHS[name] || [];
        return React.createElement(
            "svg",
            {
                xmlns: "http://www.w3.org/2000/svg",
                width: size,
                height: size,
                viewBox: "0 0 24 24",
                fill: "none",
                stroke: "currentColor",
                strokeWidth: 2,
                strokeLinecap: "round",
                strokeLinejoin: "round",
                className,
                "aria-hidden": "true",
                ...props
            },
            renderIconChildren(nodes, name)
        );
    };
};
