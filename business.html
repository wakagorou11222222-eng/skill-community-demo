const makeIcon = (name) => {
  return ({ size = 24, className = "" }) => {
    const icons = (typeof window !== "undefined" && window.lucide) ? window.lucide : {};
    const el = icons[name];

    // Lucide CDNが一時的に読めない場合でも、画面全体を止めないフォールバック。
    if (!Array.isArray(el)) {
      return React.createElement(
        "svg",
        {
          width: size,
          height: size,
          viewBox: "0 0 24 24",
          fill: "none",
          stroke: "currentColor",
          strokeWidth: 2,
          strokeLinecap: "round",
          strokeLinejoin: "round",
          className,
          style: { display: "inline-block", verticalAlign: "middle" },
          "aria-hidden": "true"
        },
        React.createElement("circle", { cx: 12, cy: 12, r: 9 }),
        React.createElement("path", { d: "M8 12h8" }),
        React.createElement("path", { d: "M12 8v8" })
      );
    }

    const [tag, attrs, children] = el;
    const svgAttrs = {
      ...attrs,
      width: size,
      height: size,
      className,
      style: { display: "inline-block", verticalAlign: "middle" }
    };
    const renderChildren = (ch) => ch.map(([t, a, c], i) =>
      React.createElement(t, { ...a, key: i }, c ? renderChildren(c) : null)
    );
    return React.createElement("svg", svgAttrs, children ? renderChildren(children) : null);
  };
};

  const isReceiverSide = isReceiver || isReceiverBoss;
  const isSender = viewerRole === "sender";
  const isParticipant = viewerRole === "participant";

  const candidateTeams = useMemo(() => TEAM_BLUEPRINTS_BY_TEMPLATE[templateKey] || TEAM_BLUEPRINTS_BY_TEMPLATE.custom, [templateKey]);

    if (!p) return false;
    if (isReceiverSide) {
      if (p.orgType === "社内" && !showInternal) return false;
      if (p.orgType === "参加企業" && !showCompany) return false;
      if (p.orgType === "公共・地域知見" && !includePublicKnowledge) return false;
      return true;
    }
    return true;
  };

  const visibleParticipants = useMemo(() => PARTICIPANTS.filter(isParticipantVisible), [showInternal,showCompany,includePublicKnowledge,viewerRole]);
  const filteredTeams = useMemo(() => candidateTeams.map(team => {
    const vis = team.memberIds.filter(id => isParticipantVisible(PARTICIPANTS.find(p => p.id === id)));
    return {...team, visibleMemberIds:vis, hiddenMemberCount:team.memberIds.length - vis.length};
  }).filter(t => t.visibleMemberIds.length > 0), [candidateTeams,showInternal,showCompany,includePublicKnowledge,viewerRole]);

  const selectedTeam = candidateTeams.find(t => t.id === selectedTeamId) || candidateTeams[0];
  const currentRoleGuide = ROLE_GUIDANCE[viewerRole] || ROLE_GUIDANCE.receiver;
  const completedSteps = Object.values(flowStatus).filter(Boolean).length;
  const progressRate = Math.round((completedSteps / Object.values(flowStatus).length) * 100);
  const currentCaseMeta = CASE_META[templateKey] || CASE_META.custom;
  const currentRequiredSkills = skills.length ? skills : (JOB_TEMPLATES[templateKey]?.skills || []);

  const getDisplayName = (m) => {
    if (!m) return "";
    if (isReceiverSide) return m.orgType === "社内" ? m.realName : m.anonymousName;
    if (isSender) return m.org === SENDER_ORG ? m.realName : m.anonymousName;
    if (isParticipant) return m.id === "P02" ? "自分" : m.anonymousName;
    return m.anonymousName;
  };
  const getDisplayOrg = (m) => {
    if (!m) return "";
    if (isReceiverSide) return m.orgType === "社内" ? m.org : m.orgType;
    if (isSender) return m.org === SENDER_ORG ? m.org : m.orgType;
    if (isParticipant) return m.id === "P02" ? m.org : m.orgType;
    return m.orgType;

                    <div key={label} className="flex items-center justify-between rounded-xl bg-gray-50 border border-gray-100 px-4 py-3">
                      <span className="text-sm font-black text-gray-700">{label}</span>
                      <Pill tone="green">表示</Pill>
                    </div>
                  ))}
                </div>
              </SectionCard>
              <SectionCard title="表示しない情報" icon={Lock}>
                <div className="rounded-2xl bg-gray-50 border border-gray-100 p-6 text-center">
                  <Lock size={36} className="mx-auto text-gray-300 mb-3" />
                  <p className="text-sm font-black text-gray-800">個人の学習・キャリア情報は表示しません。</p>
                  <p className="mt-2 text-xs font-bold text-gray-500 leading-relaxed">現状スキル、目標キャリア、スキルギャップ、教材提案は参加者本人のみが確認します。</p>
                </div>
              </SectionCard>
              <button className="w-full py-4 rounded-2xl text-white text-xs font-black flex items-center justify-center gap-2" style={{background:NAVY}}>
                <Download size={14}/> 成果物・完了記録をCSV出力
              </button>
            </div>
          </div>
        )}
      </main>

      <div className="fixed bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-6 bg-white px-8 py-4 rounded-2xl shadow-2xl border border-gray-200 z-50">
        <div className="flex items-center gap-3 border-r pr-6">
          <div className="p-2 rounded-xl text-white" style={{background:borderColor}}><UserCog size={20}/></div>
          <div>
            <span className="text-xs font-black text-gray-400 block uppercase">表示ロール</span>
            <select value={viewerRole} onChange={e=>setViewerRole(e.target.value)} className="text-sm font-black bg-transparent outline-none cursor-pointer text-blue-900">
              {ROLE_OPTIONS.map(opt=><option key={opt.value} value={opt.value}>{opt.label}</option>)}
            </select>
          </div>
        </div>
        <div className="flex items-center gap-3">
          <div className="relative"><div className="w-3 h-3 rounded-full bg-green-400 animate-ping absolute opacity-30"></div><div className="w-3 h-3 rounded-full bg-green-500 relative"></div></div>
          <span className="text-xs font-black text-gray-600">操作デモ中</span>
        </div>
      </div>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
} catch (error) {
  console.error(error);
  const root = document.getElementById("root");
  root.innerHTML = `
    <div style="max-width:900px;margin:40px auto;padding:24px;background:#fff;border:1px solid #fecaca;border-radius:16px;font-family:'Yu Gothic UI','Noto Sans JP',sans-serif;color:#7f1d1d;">
      <h2 style="font-size:18px;font-weight:800;margin:0 0 12px;">画面の読み込みでエラーが発生しました</h2>
      <p style="font-size:14px;line-height:1.7;margin:0;">${String(error && error.message ? error.message : error)}</p>
    </div>`;
}
</script>
</body>
</html>
